<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase GitHub OAuth Test</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #user-info { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Supabase GitHub OAuth Test</h1>
  <button id="github-login">Sign in with GitHub</button>
  <div id="user-info"></div>

  <script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js";

const supabaseUrl = "https://rhjkmpgrvxclmkeizshl.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";
const supabase = createClient(supabaseUrl, supabaseKey);

const loginButton = document.getElementById('github-login');
const userInfoDiv = document.getElementById('user-info');

loginButton.addEventListener('click', async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'github',
    options: { redirectTo: window.location.origin }
  });
  if (error) console.error('Login error:', error);
});

async function checkUser() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    userInfoDiv.innerHTML = `
      <p><strong>Logged in as:</strong> ${session.user.email || 'GitHub User'}</p>
      <p><strong>User ID:</strong> ${session.user.id}</p>
    `;
    loginButton.style.display = 'none';
  }
}

checkUser();

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN') checkUser();
});
</script>

</body>
</html>
